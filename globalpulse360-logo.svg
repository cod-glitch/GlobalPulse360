<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#141820"/>
      <stop offset="100%" stop-color="#080a0f"/>
    </radialGradient>
    <radialGradient id="globeGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#1e2d4a"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </radialGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8c96a"/>
      <stop offset="100%" stop-color="#c9a84c"/>
    </linearGradient>
    <linearGradient id="pulseGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0"/>
      <stop offset="30%" stop-color="#e8c96a" stop-opacity="1"/>
      <stop offset="70%" stop-color="#e8c96a" stop-opacity="1"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="circleClip">
      <circle cx="200" cy="185" r="115"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#bgGrad)" rx="40"/>

  <!-- Outer ring glow -->
  <circle cx="200" cy="185" r="130" fill="none" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.15"/>
  <circle cx="200" cy="185" r="118" fill="none" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.25"/>

  <!-- Globe body -->
  <circle cx="200" cy="185" r="115" fill="url(#globeGrad)" filter="url(#softglow)"/>
  <circle cx="200" cy="185" r="115" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" stroke-opacity="0.6"/>

  <!-- Globe grid lines (clipped) -->
  <g clip-path="url(#circleClip)" opacity="0.18" stroke="#c9a84c" stroke-width="0.8" fill="none">
    <!-- Latitude lines -->
    <ellipse cx="200" cy="185" rx="115" ry="32"/>
    <ellipse cx="200" cy="185" rx="115" ry="65"/>
    <ellipse cx="200" cy="185" rx="115" ry="95"/>
    <line x1="85" y1="185" x2="315" y2="185"/>
    <!-- Longitude lines -->
    <ellipse cx="200" cy="185" rx="32" ry="115"/>
    <ellipse cx="200" cy="185" rx="65" ry="115"/>
    <ellipse cx="200" cy="185" rx="95" ry="115"/>
    <line x1="200" y1="70" x2="200" y2="300"/>
  </g>

  <!-- Subtle continent blobs -->
  <g clip-path="url(#circleClip)" opacity="0.22" fill="#3a7bd5">
    <!-- Europe/Africa blob -->
    <ellipse cx="195" cy="155" rx="18" ry="22"/>
    <ellipse cx="190" cy="195" rx="12" ry="25"/>
    <!-- Americas -->
    <ellipse cx="148" cy="160" rx="14" ry="18"/>
    <ellipse cx="155" cy="200" rx="10" ry="20"/>
    <!-- Asia -->
    <ellipse cx="245" cy="148" rx="28" ry="16"/>
    <ellipse cx="255" cy="175" rx="22" ry="14"/>
    <!-- Australia -->
    <ellipse cx="260" cy="215" rx="14" ry="10"/>
  </g>

  <!-- Pulse wave cut through the globe -->
  <!-- Background mask to show pulse cutting through -->
  <g filter="url(#glow)">
    <path d="M 60 185 L 110 185 L 128 155 L 148 215 L 165 165 L 185 205 L 200 175 L 218 205 L 235 158 L 252 215 L 268 165 L 285 195 L 300 185 L 340 185"
      fill="none"
      stroke="url(#pulseGrad)"
      stroke-width="3.5"
      stroke-linecap="round"
      stroke-linejoin="round"/>
  </g>

  <!-- Glowing dot at pulse peak (center) -->
  <circle cx="200" cy="175" r="5" fill="#e8c96a" filter="url(#softglow)" opacity="0.9"/>
  <circle cx="200" cy="175" r="3" fill="#fff" opacity="0.95"/>

  <!-- Signal rings emanating from center dot -->
  <circle cx="200" cy="175" r="14" fill="none" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.4"/>
  <circle cx="200" cy="175" r="24" fill="none" stroke="#c9a84c" stroke-width="0.7" stroke-opacity="0.2"/>

  <!-- 360 arc badge top right -->
  <g transform="translate(282, 88)">
    <circle r="22" fill="#c9a84c" fill-opacity="0.12" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.5"/>
    <text x="0" y="4" text-anchor="middle" dominant-baseline="middle"
      font-family="'Outfit', sans-serif" font-size="11" font-weight="700"
      fill="#e8c96a" letter-spacing="0.5">360°</text>
  </g>

  <!-- Wordmark -->
  <text x="200" y="336"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="28"
    font-weight="700"
    letter-spacing="1"
    fill="#f0ede8">Global<tspan fill="#c9a84c" font-style="italic">Pulse</tspan><tspan fill="#f0ede8">360</tspan></text>

  <!-- Tagline -->
  <text x="200" y="358"
    text-anchor="middle"
    font-family="'Outfit', Arial, sans-serif"
    font-size="8.5"
    font-weight="400"
    letter-spacing="3.5"
    fill="#c9a84c"
    opacity="0.7">WORLDWIDE · EVERY ANGLE</text>

  <!-- Gold divider under globe -->
  <line x1="155" y1="318" x2="245" y2="318" stroke="#c9a84c" stroke-width="0.8" stroke-opacity="0.4"/>
</svg>
